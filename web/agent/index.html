<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Console · 代理控制台</title>
<style>
  * { box-sizing: border-box; }
  body { font: 14px/1.5 -apple-system, "Segoe UI", "PingFang SC", Roboto, sans-serif;
         margin: 0; color: #1a2230; background: #f5f7fa; }
  header { background: #1f2937; color: #fff; padding: 10px 16px; display: flex; gap: 10px;
           align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0 12px 0 0; font-weight: 600; }
  header input { padding: 5px 8px; border-radius: 6px; border: 1px solid #4b5563; }
  button { cursor: pointer; border: 1px solid #cbd5e1; background: #fff; padding: 5px 10px;
           border-radius: 6px; font-size: 13px; }
  button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
  button.warn { background: #b91c1c; color: #fff; border-color: #b91c1c; }
  button:disabled { opacity: .5; cursor: default; }
  .layout { display: grid; grid-template-columns: 340px 1fr; gap: 12px; padding: 12px;
            align-items: start; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; }
  .caserow { padding: 8px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
  .caserow:hover { background: #f1f5f9; }
  .caserow.sel { background: #eff6ff; border-color: #bfdbfe; }
  .pill { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 11px;
          background: #e5e7eb; color: #374151; }
  .pill.await { background: #fef3c7; color: #92400e; }
  .pill.sent { background: #dcfce7; color: #166534; }
  .msg { border-left: 3px solid #e5e7eb; padding: 6px 10px; margin: 8px 0; }
  .msg.broker { border-color: #f59e0b; } .msg.agent { border-color: #2563eb; }
  .msg pre { white-space: pre-wrap; margin: 4px 0 0; font-family: inherit; }
  textarea { width: 100%; min-height: 160px; font: 13px/1.5 ui-monospace, monospace;
             padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; }
  .missing { color: #b91c1c; font-weight: 600; }
  .muted { color: #6b7280; font-size: 12px; }
  .err { color: #b91c1c; margin: 6px 0; min-height: 18px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<header>
  <h1>Agent Console · 代理控制台</h1>
  <input id="email" placeholder="邮箱 / email" autocomplete="username">
  <input id="pw" type="password" placeholder="密码 / password" autocomplete="current-password"
         onkeydown="if(event.key==='Enter')login()">
  <button class="primary" onclick="login()">登录 / Log in</button>
  <button onclick="logout()" id="logoutBtn" style="display:none">登出 / Log out</button>
  <span id="who" class="muted"></span>
  <span id="loginErr" class="muted" style="color:#fca5a5"></span>
</header>

<div class="layout">
  <div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <strong>案件 / Cases</strong><button onclick="loadCases()">刷新 / Refresh</button>
      </div>
      <div id="cases"></div>
    </div>
    <div class="card" style="margin-top:12px">
      <strong>新客户 / Onboard customer</strong>
      <div class="muted" style="margin:4px 0">创建客户机构 + 启用合作 + 网页登录账号</div>
      <input id="onbName" placeholder="客户名称 / Customer name"
             style="width:100%;margin:4px 0;padding:5px 8px;border-radius:6px;border:1px solid #cbd5e1">
      <input id="onbLogin" placeholder="登录邮箱 / login email"
             style="width:100%;margin:4px 0;padding:5px 8px;border-radius:6px;border:1px solid #cbd5e1">
      <input id="onbPw" placeholder="密码（留空自动生成）/ password (blank = auto)"
             style="width:100%;margin:4px 0;padding:5px 8px;border-radius:6px;border:1px solid #cbd5e1">
      <button class="primary" onclick="onboardCustomer()">创建 / Create</button>
      <div id="onbErr" class="err"></div>
      <div id="onbOk" class="muted"></div>
    </div>
    <div class="card" style="margin-top:12px">
      <strong>添加操作员 / Add operator</strong>
      <div class="muted" style="margin:4px 0">为本机构创建一个操作员登录(邮箱 + 密码)</div>
      <input id="agName" placeholder="姓名 / name"
             style="width:100%;margin:4px 0;padding:5px 8px;border-radius:6px;border:1px solid #cbd5e1">
      <input id="agEmail" placeholder="邮箱 / email"
             style="width:100%;margin:4px 0;padding:5px 8px;border-radius:6px;border:1px solid #cbd5e1">
      <input id="agPw" placeholder="密码（留空自动生成）/ password (blank = auto)"
             style="width:100%;margin:4px 0;padding:5px 8px;border-radius:6px;border:1px solid #cbd5e1">
      <button class="primary" onclick="addAgent()">创建 / Create</button>
      <div id="agErr" class="err"></div>
      <div id="agOk" class="muted"></div>
    </div>
    <div class="card" style="margin-top:12px">
      <div class="row" style="justify-content:space-between">
        <strong>经纪人 / Brokers</strong><button onclick="loadBrokers()">刷新 / Refresh</button>
      </div>
      <div class="muted" style="margin:4px 0">邮件将发往各经纪人的收件地址(仅管理员可增改)</div>
      <div id="brokers"></div>
      <input id="brName" placeholder="经纪人名称 / Broker name"
             style="width:100%;margin:4px 0;padding:5px 8px;border-radius:6px;border:1px solid #cbd5e1">
      <input id="brEmail" placeholder="收件邮箱 / recipient email"
             style="width:100%;margin:4px 0;padding:5px 8px;border-radius:6px;border:1px solid #cbd5e1">
      <input id="brMailbox" placeholder="发件邮箱(选填)/ sending mailbox (optional)"
             style="width:100%;margin:4px 0;padding:5px 8px;border-radius:6px;border:1px solid #cbd5e1">
      <button class="primary" onclick="addBroker()">添加 / Add</button>
      <div id="brErr" class="err"></div>
      <div id="brOk" class="muted"></div>
    </div>
  </div>
  <div class="card">
    <div id="detail"><p class="muted">选择一个案件。 Select a case.</p></div>
  </div>
</div>

<script>
const API = "/api";                   // same-origin; Vercel routes /api/* to the function
let TOKEN = localStorage.getItem("token") || "";
let CURRENT = null;

function headers() { return TOKEN ? { "Authorization": "Bearer " + TOKEN } : {}; }

async function addAgent() {
  const err = document.getElementById("agErr"), ok = document.getElementById("agOk");
  err.textContent = ""; ok.textContent = "";
  const name = document.getElementById("agName").value.trim();
  const email = document.getElementById("agEmail").value.trim();
  const password = document.getElementById("agPw").value;
  if (!name || !email) { err.textContent = "请填写姓名与邮箱 / name + email required"; return; }
  const body = { name, email };
  if (password) body.password = password;
  const { status, data } = await api("POST", "/agents", body);
  if (status !== 201) { err.textContent = `${status} ${data.error || "失败 / failed"}`; return; }
  const pwMsg = data.temp_password ? `，临时密码 / temp password: ${data.temp_password}` : "";
  ok.textContent = `已创建操作员 / operator created — ${data.login}${pwMsg}`;
  document.getElementById("agName").value = "";
  document.getElementById("agEmail").value = "";
  document.getElementById("agPw").value = "";
}

async function onboardCustomer() {
  const err = document.getElementById("onbErr"), ok = document.getElementById("onbOk");
  err.textContent = ""; ok.textContent = "";
  const customer_name = document.getElementById("onbName").value.trim();
  const login = document.getElementById("onbLogin").value.trim();
  const password = document.getElementById("onbPw").value;
  if (!customer_name || !login) { err.textContent = "请填写名称与登录邮箱 / name + login required"; return; }
  const body = { customer_name, login };
  if (password) body.password = password;
  const { status, data } = await api("POST", "/onboard-customer", body);
  if (status !== 201) { err.textContent = `${status} ${data.error || "失败 / failed"}`; return; }
  const pwMsg = data.temp_password ? `，临时密码 / temp password: ${data.temp_password}` : "";
  ok.textContent = `已创建 / created — 客户在 /customer 用 “${data.login}” 登录${pwMsg}`;
  document.getElementById("onbName").value = "";
  document.getElementById("onbLogin").value = "";
  document.getElementById("onbPw").value = "";
}

async function loadBrokers() {
  const el = document.getElementById("brokers");
  if (!TOKEN) { el.innerHTML = ""; return; }
  const { status, data } = await api("GET", "/brokers");
  if (status !== 200) { el.innerHTML = `<p class="err">${status} ${esc(data.error||"")}</p>`; return; }
  if (!data.brokers.length) { el.innerHTML = '<p class="muted">无经纪人 / No brokers</p>'; return; }
  el.innerHTML = data.brokers.map(b => `
    <div class="row" style="justify-content:space-between;margin:4px 0">
      <span><strong>${esc(b.name)}</strong>${b.mailbox ? ` <span class="muted">via ${esc(b.mailbox)}</span>` : ""}</span>
    </div>
    <div class="row" style="gap:6px">
      <input id="bre-${esc(b.account_id)}" value="${esc(b.broker_email||"")}"
             style="flex:1;padding:5px 8px;border-radius:6px;border:1px solid #cbd5e1">
      <button onclick="saveBrokerEmail('${esc(b.account_id)}')">保存 / Save</button>
    </div>`).join("");
}

async function addBroker() {
  const err = document.getElementById("brErr"), ok = document.getElementById("brOk");
  err.textContent = ""; ok.textContent = "";
  const name = document.getElementById("brName").value.trim();
  const broker_email = document.getElementById("brEmail").value.trim();
  const mailbox = document.getElementById("brMailbox").value.trim();
  if (!name || !broker_email) { err.textContent = "请填写名称与收件邮箱 / name + recipient required"; return; }
  const body = { name, broker_email };
  if (mailbox) body.mailbox = mailbox;
  const { status, data } = await api("POST", "/brokers", body);
  if (status !== 201) { err.textContent = `${status} ${data.error || "失败 / failed"}`; return; }
  ok.textContent = `已添加 / added — ${esc(data.name)} → ${esc(data.broker_email)}`;
  document.getElementById("brName").value = "";
  document.getElementById("brEmail").value = "";
  document.getElementById("brMailbox").value = "";
  loadBrokers();
}

async function saveBrokerEmail(accountId) {
  const err = document.getElementById("brErr"), ok = document.getElementById("brOk");
  err.textContent = ""; ok.textContent = "";
  const broker_email = document.getElementById("bre-" + accountId).value.trim();
  if (!broker_email) { err.textContent = "收件邮箱不可为空 / recipient required"; return; }
  const { status, data } = await api("POST", "/brokers/" + encodeURIComponent(accountId),
                                     { broker_email });
  if (status !== 200) { err.textContent = `${status} ${data.error || "失败 / failed"}`; return; }
  ok.textContent = `已更新 / updated → ${esc(data.broker_email)}`;
}

async function api(method, path, body) {
  const opt = { method, headers: { ...headers() } };
  if (body !== undefined) { opt.headers["Content-Type"] = "application/json";
                            opt.body = JSON.stringify(body); }
  const r = await fetch(API + path, opt);
  let data = {}; try { data = await r.json(); } catch (e) {}
  if (r.status === 401 && path !== "/auth/login" && TOKEN) {   // session expired/invalid
    logout();
    document.getElementById("loginErr").textContent = "会话已过期，请重新登录 / session expired";
  }
  return { status: r.status, data };
}

function esc(s) {   // escapes text AND attribute/JS-string contexts (quotes included)
  return (s ?? "").replace(/[&<>"']/g,
    c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function statusPill(st) {
  const cls = st === "AWAITING_BROKER" ? "await" : st === "SENT_TO_BROKER" ? "sent" : "";
  return `<span class="pill ${cls}">${esc(st)}</span>`;
}

async function login() {
  const err = document.getElementById("loginErr"); err.textContent = "";
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("pw").value;
  if (!email || !password) { err.textContent = "邮箱 + 密码 / email + password"; return; }
  const { status, data } = await api("POST", "/auth/login", { email, password });
  if (status !== 200) { err.textContent = data.error || "登录失败 / login failed"; return; }
  if (!data.is_agent) {   // a customer account here would silently show empty, draft-less cases
    err.textContent = "此账号非代理账号,请用代理账号登录 / Not an agent account — use an agent login";
    return;
  }
  TOKEN = data.session_token; localStorage.setItem("token", TOKEN);
  document.getElementById("pw").value = "";
  setSignedIn(data.user && (data.user.name || data.user.id));
  loadCases();
  loadBrokers();
}

function logout() {
  TOKEN = ""; localStorage.removeItem("token");
  setSignedIn(null);
  document.getElementById("cases").innerHTML = "";
  document.getElementById("brokers").innerHTML = "";
  document.getElementById("detail").innerHTML = '<p class="muted">选择一个案件。 Select a case.</p>';
}

function setSignedIn(who) {
  document.getElementById("who").textContent = who ? ("as " + who) : "";
  document.getElementById("logoutBtn").style.display = who ? "" : "none";
}

async function loadCases() {
  const el = document.getElementById("cases");
  if (!TOKEN) { el.innerHTML = '<p class="err">请先登录 / Log in first</p>'; return; }
  const { status, data } = await api("GET", "/cases");
  if (status !== 200) { el.innerHTML = `<p class="err">${status} ${esc(data.error||"")}</p>`; return; }
  if (!data.cases.length) { el.innerHTML = '<p class="muted">无案件 / No cases</p>'; return; }
  el.innerHTML = data.cases.map(c => `
    <div class="caserow ${CURRENT===c.id?'sel':''}" onclick="openCase('${esc(c.id)}')">
      <div class="row" style="justify-content:space-between">
        <strong>${esc(c.shipment_bol||"(no BOL)")}</strong> ${statusPill(c.status)}
      </div>
      <div class="muted">${esc(c.issue_type||"?")} · ${esc(c.origin)}</div>
    </div>`).join("");
}

async function openCase(id) {
  CURRENT = id; loadCases();
  const d = document.getElementById("detail");
  const { status, data } = await api("GET", "/cases/" + id);
  if (status !== 200) { d.innerHTML = `<p class="err">${status} ${esc(data.error||"")}</p>`; return; }
  const c = data.case;
  const pending = data.messages.find(m => m.status === "pending_approval");
  let clsPanel = "";
  if (pending) {
    let cls = {}; try { cls = JSON.parse(pending.classification || "{}"); } catch (e) {}
    const miss = (cls.missing || []).map(x => `<span class="missing">${esc(x)}</span>`).join(", ");
    const warns = (cls.warnings || []).map(x => `<div class="missing">⚠ ${esc(x)}</div>`).join("");
    clsPanel =
      `<div class="muted">分类 / Classification: triage=${esc(cls.triage||"?")} · issue=${esc(cls.issue||"?")} · template=${esc(cls.template||"?")}</div>`
      + (miss ? `<div>待补 / Missing: ${miss}</div>` : "")
      + warns;
  }
  const thread = data.messages.map(m => `
    <div class="msg ${esc(m.party)}">
      <div class="muted">${esc(m.party)} · ${esc(m.channel)} · ${esc(m.lang||"")} · ${esc(m.status)}</div>
      <pre>${esc(m.body)}</pre>
    </div>`).join("");
  d.innerHTML = `
    <div class="row" style="justify-content:space-between">
      <h3 style="margin:0">BOL ${esc(c.shipment_bol||"—")} · ${esc(c.issue_type||"?")}</h3>
      ${statusPill(c.status)}
    </div>
    <div class="err" id="err"></div>
    ${pending ? `
      <p><strong>待审草稿 / Pending draft</strong> <span class="muted">(edit then approve)</span></p>
      ${clsPanel}
      <textarea id="draft">${esc(pending.body)}</textarea>
      <div class="row" style="margin-top:8px">
        <button class="primary" onclick="act('${esc(id)}','${esc(pending.id)}','approve')">批准并发送 / Approve & send</button>
        <button onclick="act('${esc(id)}','${esc(pending.id)}','edit')">保存编辑 / Save edit</button>
        <button class="warn" onclick="act('${esc(id)}','${esc(pending.id)}','reject')">驳回 / Reject</button>
      </div>` : '<p class="muted">无待审草稿 / No pending draft</p>'}
    <p style="margin-top:14px"><strong>线程 / Thread</strong></p>${thread}
    <details style="margin-top:10px"><summary class="muted">审计 / Audit</summary><div id="audit"></div></details>`;
  loadAudit(id);
}

async function loadAudit(id) {
  const { status, data } = await api("GET", "/cases/" + id + "/audit");
  const el = document.getElementById("audit"); if (!el) return;
  el.innerHTML = status === 200
    ? data.audit.map(a => `<div class="muted">${esc(a.action)}: ${esc(a.from_status)}→${esc(a.to_status)} (${esc(a.actor)})</div>`).join("")
    : `<span class="err">${status}</span>`;
}

async function act(caseId, msgId, action) {
  const err = document.getElementById("err"); err.textContent = "";
  let body;
  if (action === "edit" || action === "approve") {
    // send any edits first for approve too, so the sent text matches what the operator sees
    const draft = document.getElementById("draft").value;
    if (!draft.trim()) { err.textContent = "草稿为空 / draft is empty"; return; }
    if (action === "edit") body = { body: draft };
    else { const e = await api("POST", `/cases/${caseId}/messages/${msgId}/edit`, { body: draft });
           if (e.status !== 200) { err.textContent = `${e.status} ${e.data.error||""}`; return; } }
  }
  const { status, data } = await api("POST", `/cases/${caseId}/messages/${msgId}/${action}`, body);
  if (status !== 200) { err.textContent = `${status} ${data.error || ""}`; return; }
  openCase(caseId);
}

async function initSession() {   // restore a stored session on load — verify identity via /auth/me
  if (!TOKEN) return;
  const { status, data } = await api("GET", "/auth/me");
  if (status !== 200) { logout(); return; }          // stale/invalid token
  if (!data.is_agent) {                               // a non-agent session must not linger here
    logout();
    document.getElementById("loginErr").textContent =
      "此账号非代理账号,请用代理账号登录 / Not an agent account — use an agent login";
    return;
  }
  setSignedIn(data.user && (data.user.name || data.user.id));
  loadCases();
  loadBrokers();
}
initSession();
</script>
</body>
</html>
