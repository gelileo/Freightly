<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>客户中心 · Customer</title>
<style>
  * { box-sizing: border-box; }
  body { font: 15px/1.6 -apple-system, "PingFang SC", "Segoe UI", Roboto, sans-serif;
         margin: 0; color: #1a2230; background: #f5f7fa; }
  header { background: #0f766e; color: #fff; padding: 12px 16px; display: flex; gap: 10px;
           align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 17px; margin: 0 10px 0 0; }
  input, select, textarea { padding: 8px 10px; border-radius: 8px; border: 1px solid #cbd5e1;
                            font: inherit; width: 100%; }
  header input { width: auto; }
  button { cursor: pointer; border: 1px solid #0f766e; background: #0f766e; color: #fff;
           padding: 8px 14px; border-radius: 8px; font-size: 14px; }
  button.ghost { background: #fff; color: #0f766e; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 14px; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px;
          margin-bottom: 14px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .field { margin: 10px 0; } .field label { display: block; font-size: 13px; color: #374151;
           margin-bottom: 4px; } .req { color: #b91c1c; }
  .caserow { padding: 10px; border-bottom: 1px solid #eef2f7; display: flex;
             justify-content: space-between; gap: 10px; }
  .pill { padding: 2px 10px; border-radius: 999px; font-size: 12px; background: #e5e7eb;
          white-space: nowrap; }
  .muted { color: #6b7280; font-size: 13px; } .err { color: #b91c1c; min-height: 18px; }
  .ok { color: #047857; }
  .hidden { display: none; }
</style>
</head>
<body>
<header>
  <h1>客户中心 · Customer</h1>
  <input id="email" placeholder="登录邮箱 / login email" autocomplete="username">
  <input id="pw" type="password" placeholder="密码 / password" autocomplete="current-password"
         onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">登录 / Log in</button>
  <button onclick="logout()" id="logoutBtn" style="display:none">登出 / Log out</button>
  <span id="who" class="muted" style="color:#d1fae5"></span>
  <span id="loginErr" class="muted" style="color:#fecaca"></span>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="ghost" onclick="show('cases')">我的案件 / My cases</button>
    <button class="ghost" onclick="show('new')">＋ 新建案件 / New case</button>
  </div>

  <div id="cases" class="card">
    <div class="err" id="casesErr"></div>
    <div id="caseList"><p class="muted">登录后查看。 Log in to view.</p></div>
    <div id="caseDetail"></div>
  </div>

  <div id="new" class="card hidden">
    <h3 style="margin-top:0">新建案件 / Start a case</h3>
    <div class="field"><label>代理 / Agent</label><select id="eng"></select></div>
    <div class="field"><label>承运商 / Broker</label><select id="broker"></select></div>
    <div class="field"><label>问题类型 / Issue type</label><select id="issue" onchange="renderFields()"></select></div>
    <div class="field"><label>运单号 BOL <span class="req">*</span></label><input id="bol" placeholder="e.g. 60114839031"></div>
    <div id="dynFields"></div>
    <div class="field"><label>补充说明 / Note</label><textarea id="note" rows="3" placeholder="用中文描述您的诉求"></textarea></div>
    <div class="err" id="newErr"></div>
    <button onclick="submitCase()">提交 / Submit</button>
    <span id="newOk" class="ok"></span>
  </div>
</div>

<script>
let TOKEN = localStorage.getItem("ctoken") || "";
let ISSUE_TYPES = [], ENGAGEMENTS = [];
const STATUS_ZH = {
  NEW: "待处理", DRAFTING: "拟稿中", PENDING_APPROVAL: "代理审核中",
  SENT_TO_BROKER: "已转交承运商", POSTED_TO_CUSTOMER: "已回复您", AWAITING_BROKER: "等待承运商回复",
  REPLY_DRAFTED: "拟回复中", RESOLVED: "已解决", CLOSED: "已关闭",
};

function esc(s) { return (s ?? "").replace(/[&<>"']/g,
  c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
const API = "/api";                   // same-origin; Vercel routes /api/* to the function
function headers() { return TOKEN ? { "Authorization": "Bearer " + TOKEN } : {}; }
async function api(method, path, body) {
  const opt = { method, headers: { ...headers() } };
  if (body !== undefined) { opt.headers["Content-Type"] = "application/json"; opt.body = JSON.stringify(body); }
  const r = await fetch(API + path, opt); let d = {}; try { d = await r.json(); } catch (e) {}
  if (r.status === 401 && path !== "/auth/login" && TOKEN) {
    logout(); document.getElementById("loginErr").textContent = "会话已过期 / session expired";
  }
  return { status: r.status, data: d };
}
function show(id) { for (const s of ["cases","new"]) document.getElementById(s).classList.toggle("hidden", s !== id); }
function setSignedIn(who) {
  document.getElementById("who").textContent = who ? ("as " + who) : "";
  document.getElementById("logoutBtn").style.display = who ? "" : "none";
}

async function login() {
  const err = document.getElementById("loginErr"); err.textContent = "";
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("pw").value;
  if (!email || !password) { err.textContent = "邮箱 + 密码 / email + password"; return; }
  const { status, data } = await api("POST", "/auth/login", { email, password });
  if (status !== 200) { err.textContent = data.error || "登录失败 / login failed"; return; }
  TOKEN = data.session_token; localStorage.setItem("ctoken", TOKEN);
  document.getElementById("pw").value = "";
  setSignedIn(data.user && (data.user.name || data.user.id));
  loadCases(); loadNewCaseData();
}

function logout() {
  TOKEN = ""; localStorage.removeItem("ctoken"); setSignedIn(null);
  document.getElementById("caseList").innerHTML = '<p class="muted">请先登录。 Log in first.</p>';
}

async function loadCases() {
  const el = document.getElementById("caseList"), err = document.getElementById("casesErr");
  err.textContent = "";
  if (!TOKEN) { el.innerHTML = '<p class="muted">请先登录。 Log in first.</p>'; return; }
  const { status, data } = await api("GET", "/cases");
  if (status !== 200) { err.textContent = `${status} ${data.error||""}`; return; }
  if (!data.cases.length) { el.innerHTML = '<p class="muted">暂无案件。 No cases yet.</p>'; return; }
  el.innerHTML = data.cases.map(c => `
    <div class="caserow" style="cursor:pointer" onclick="openCustomerCase('${esc(c.id)}')">
      <div><strong>${esc(c.shipment_bol||"(无 BOL)")}</strong>
        <div class="muted">${esc(c.issue_type||"")} · 点击查看更新 / tap for updates</div></div>
      <span class="pill">${esc(STATUS_ZH[c.status] || c.status)}</span>
    </div>`).join("");
}

async function openCustomerCase(id) {
  const d = document.getElementById("caseDetail");
  const { status, data } = await api("GET", "/cases/" + id);
  if (status !== 200) { d.innerHTML = `<p class="err">${status} ${data.error||""}</p>`; return; }
  // Only agent-approved Chinese updates are shown — never internal English drafts.
  const updates = data.messages.filter(m => m.channel === "app" && m.lang === "zh" && m.status === "posted");
  d.innerHTML = `<h4 style="margin:14px 0 6px">案件 ${esc(data.case.shipment_bol||"")} · 更新 / Updates</h4>`
    + (updates.length
        ? updates.map(m => `<div class="caserow"><div>${esc(m.body)}</div></div>`).join("")
        : '<p class="muted">暂无更新，代理正在处理。 No updates yet — your agent is on it.</p>');
}

async function loadNewCaseData() {
  if (!TOKEN) return;
  const it = await api("GET", "/issue-types"); ISSUE_TYPES = it.status === 200 ? it.data.issue_types : [];
  document.getElementById("issue").innerHTML =
    ISSUE_TYPES.map(i => `<option value="${esc(i.slug)}">${esc(i.label_zh)} / ${esc(i.label_en)}</option>`).join("");
  const en = await api("GET", "/engagements"); ENGAGEMENTS = en.status === 200 ? en.data.engagements : [];
  document.getElementById("eng").innerHTML =
    ENGAGEMENTS.map((e, i) => `<option value="${i}">${esc(e.agent_name)}</option>`).join("")
    || '<option value="">（无可用代理 / no agent）</option>';
  renderBrokers(); renderFields();
}
function renderBrokers() {
  const e = ENGAGEMENTS[document.getElementById("eng").value];
  document.getElementById("broker").innerHTML =
    e ? e.broker_accounts.map(b => `<option value="${esc(b.id)}">${esc(b.broker_name)}</option>`).join("") : "";
}
document.addEventListener("change", e => { if (e.target.id === "eng") renderBrokers(); });

function renderFields() {
  const slug = document.getElementById("issue").value;
  const it = ISSUE_TYPES.find(i => i.slug === slug);
  const fields = it ? it.fields : [];
  document.getElementById("dynFields").innerHTML = fields.map(f => {
    const req = f.required ? ' <span class="req">*</span>' : "";
    const lbl = `<label>${esc(f.label_zh)} / ${esc(f.label_en)}${req}</label>`;
    const input = f.type === "textarea"
      ? `<textarea data-field="${esc(f.name)}" rows="2"></textarea>`
      : `<input data-field="${esc(f.name)}" type="${esc(f.type === 'tel' ? 'tel' : f.type === 'date' ? 'date' : 'text')}">`;
    return `<div class="field">${lbl}${input}</div>`;
  }).join("");
}

async function submitCase() {
  const err = document.getElementById("newErr"), ok = document.getElementById("newOk");
  err.textContent = ""; ok.textContent = "";
  const engIdx = document.getElementById("eng").value, e = ENGAGEMENTS[engIdx];
  const bol = document.getElementById("bol").value.trim();
  if (!e) { err.textContent = "请选择代理 / pick an agent"; return; }
  if (!bol) { err.textContent = "请填写 BOL / BOL required"; return; }
  const fields = {};
  for (const el of document.querySelectorAll("#dynFields [data-field]")) {
    if (el.value.trim()) fields[el.dataset.field] = el.value.trim();
  }
  const body = {
    engagement_id: e.id, broker_account_id: document.getElementById("broker").value,
    bol, issue_type: document.getElementById("issue").value,
    wechat_text: document.getElementById("note").value.trim(), fields,
  };
  const { status, data } = await api("POST", "/cases", body);
  if (status !== 201) { err.textContent = `${status} ${data.error||"提交失败"}`; return; }
  ok.textContent = "已提交，代理将尽快处理。 Submitted.";
  document.getElementById("bol").value = ""; document.getElementById("note").value = "";
  renderFields(); loadCases(); show("cases");
}

if (TOKEN) { setSignedIn(true); loadCases(); loadNewCaseData(); }
</script>
</body>
</html>
